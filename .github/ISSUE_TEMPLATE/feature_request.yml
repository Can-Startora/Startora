name: Feature Request
about: Suggest a new idea or enhancement for this project
title: '[FEATURE] '
labels: enhancement
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Virtual Startup Launchpad even better? Let us know!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. (e.g. "I'm always frustrated when...")
      placeholder: Describe the pain point...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution You'd Like
      description: A clear and concise description of what you want to happen.
      placeholder: What is the proposed feature?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives You've Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Did you think of other ways to solve this?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here.
      placeholder: Mockup designs, diagrams, or external references...
    validations:
      required: false
